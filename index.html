<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olá Mundo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      padding: 24px 28px;
      border: 1px solid #7c3ad3;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    h1 { margin: 0 0 8px; }
    p { margin: 0; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Olá, mundo! 👋</h1>
    <p>Meu primeiro deploy na EC2 com Terraform ☁️</p>
  </div>
</body>
</html>
